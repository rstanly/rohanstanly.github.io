<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBA Portfolio — Paul Keecheril</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c87a;
      --gold-dim: rgba(201, 168, 76, 0.15);
      --white: #f5f2ec;
      --off-white: #e8e3d8;
      --muted: rgba(245, 242, 236, 0.45);
      --dark: #080808;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Canvas bg ── */
    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
    }

    /* ── Decorative lines ── */
    .line-top {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: min(80vw, 600px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 2;
      opacity: 0;
      animation: fadeReveal 2s ease 0.5s forwards;
    }

    .line-bottom {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: min(80vw, 600px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 2;
      opacity: 0;
      animation: fadeReveal 2s ease 0.8s forwards;
    }

    /* ── Corner marks ── */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      z-index: 2;
      opacity: 0;
      animation: fadeReveal 2s ease 1s forwards;
    }
    .corner--tl { top: 28px; left: 28px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--tr { top: 28px; right: 28px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner--bl { bottom: 28px; left: 28px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner--br { bottom: 28px; right: 28px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 30px;
      gap: 0;
      opacity: 0;
      animation: fadeReveal 1.8s ease 0.3s forwards;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '—';
      margin: 0 10px;
      opacity: 0.5;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--white);
      margin-bottom: 6px;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-light);
      font-weight: 300;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 52px;
      letter-spacing: 0.02em;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
      width: 200px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    a.button {
      text-decoration: none;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 38px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      border: 1px solid rgba(201, 168, 76, 0.35);
      background: transparent;
      cursor: pointer;
      transition: all 0.4s ease;
      overflow: hidden;
    }

    a.button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-dim), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    a.button::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold-light);
      transition: width 0.4s ease;
    }

    a.button:hover {
      color: var(--gold-light);
      border-color: rgba(201, 168, 76, 0.7);
      transform: translateY(-2px);
    }

    a.button:hover::before { opacity: 1; }
    a.button:hover::after { width: 100%; }

    a.button svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    a.button:hover svg {
      opacity: 1;
      transform: translateX(3px);
    }

    a.button.primary {
      background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
      border-color: rgba(201, 168, 76, 0.6);
    }

    a.button.primary:hover {
      background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.1));
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      opacity: 0;
      animation: fadeReveal 2s ease 1.2s forwards;
    }

    .footer-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245, 242, 236, 0.3);
    }

    footer a {
      color: rgba(245, 242, 236, 0.3);
      text-decoration: none;
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    footer a:hover { color: var(--gold-light); }

    @keyframes fadeReveal {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <!-- Decorative frame -->
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <main>
    <p class="eyebrow">MBA Academic Portfolio</p>

    <h1>Academic<br><em>Work &amp; Research</em></h1>

    <p class="subtitle">A curated archive of coursework, case studies &amp; analysis</p>

    <div class="divider"><span class="divider-diamond"></span></div>

    <div class="buttons">
      <a href="assignments.html" class="button primary">
        View Assignments
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
      <a href="about.html" class="button">
        About Me
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
        </svg>
      </a>
    </div>
  </main>

  <footer>
    <span class="footer-label">© 2025</span>
    <a href="https://github.com/YOURUSERNAME">GitHub ↗</a>
  </footer>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initParticles();
    });

    const GOLD = 'rgba(201,168,76,';
    const WHITE = 'rgba(245,242,236,';
    const NUM = 90;
    let particles = [];
    let mouse = { x: W / 2, y: H / 2 };

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    class P {
      constructor() { this.reset(true); }
      reset(init) {
        this.x = Math.random() * W;
        this.y = init ? Math.random() * H : (Math.random() > 0.5 ? -4 : H + 4);
        this.size = Math.random() * 1.2 + 0.2;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.25;
        this.gold = Math.random() > 0.7;
        this.alpha = Math.random() * 0.5 + 0.2;
        this.pulse = Math.random() * Math.PI * 2;
      }
      update() {
        this.pulse += 0.012;
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 160) {
          this.vx -= dx / dist * 0.012;
          this.vy -= dy / dist * 0.012;
        }
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.995;
        this.vy *= 0.995;
        if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) this.reset(false);
      }
      draw() {
        const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.gold ? GOLD + a + ')' : WHITE + a + ')';
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < NUM; i++) particles.push(new P());
    }

    function drawConnections() {
      for (let a = 0; a < particles.length; a++) {
        for (let b = a + 1; b < particles.length; b++) {
          const dx = particles[a].x - particles[b].x;
          const dy = particles[a].y - particles[b].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 110) {
            const opacity = (1 - d / 110) * 0.07;
            ctx.strokeStyle = GOLD + opacity + ')';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.stroke();
          }
        }
      }
    }

    function drawRadialGlow() {
      const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.55);
      grad.addColorStop(0, 'rgba(201,168,76,0.04)');
      grad.addColorStop(0.5, 'rgba(201,168,76,0.015)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function animate() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, W, H);
      drawRadialGlow();
      particles.forEach(p => { p.update(); p.draw(); });
      drawConnections();
      requestAnimationFrame(animate);
    }

    initParticles();
    animate();
  </script>
</body>
</html>
